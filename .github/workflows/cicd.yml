# .github/workflows/cicd.yml
# 
# 단계별 발전 이력:
#   SSH + Private Key (JAR 직접 배포)
#   Docker Hub + docker run (컨테이너화)
#   OIDC + SSM Send-Command (키 없는 인증)
#   OIDC + ECR + ECS (현재, 서버리스 컨테이너)

name: CI/CD — ECR + ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write    # OIDC JWT 토큰 발급
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}    # mylab-backend
  ECS_CLUSTER:    ${{ vars.ECS_CLUSTER }}    # mylab-cluster
  ECS_SERVICE:    ${{ vars.ECS_SERVICE }}    # mylab-backend-service
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}    # mylab-backend
  TASK_DEFINITION: .aws/task-definition.json

jobs:

  ci:
    name: CI — Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.build-push.outputs.image-uri }}
      image-tag: ${{ steps.build-push.outputs.image-tag }}

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Maven 빌드
      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      # 4. OIDC 인증
      #    변경점: DOCKERHUB_TOKEN 불필요 → AWS OIDC Role만 사용
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/github-actions-cicd-basic-lab-role 
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CI-${{ github.run_id }}

      # 5. ECR 로그인
      #    변경점: docker/login-action (Docker Hub) → amazon-ecr-login (ECR)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 빌드 + ECR Push
      #    CICD2: {dockerhub_user}/cicd-basic-lab:{run_number}-{sha7}
      #    현재:  {계정ID}.dkr.ecr.../mylab-backend:{run_number}-{sha7}
      - name: Build, tag and push image to ECR
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          echo "빌드 이미지: ${IMAGE_URI}"

          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_SHA="${SHORT_SHA}" \
            -t ${IMAGE_URI} .

          docker push ${IMAGE_URI}

          # Job 2 (cd) 로 이미지 URI 전달
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image-tag=${TAG}"       >> $GITHUB_OUTPUT


  cd:
    name: CD — Deploy to ECS
    runs-on: ubuntu-latest
    needs: ______

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. OIDC 인증
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.______ }}:role/______
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CD-${{ github.run_id }}

      # 3. Task Definition의 ACCOUNT_ID 플레이스홀더 치환
      #    .aws/task-definition.json의 ACCOUNT_ID → 실제 계정 ID
      - name: Inject Account ID into task definition
        run: |
          ACCOUNT_ID=$(aws ______ get-caller-identity --query ______ --output text)
          sed -i "s/ACCOUNT_ID/${ACCOUNT_ID}/g" ${{ env.TASK_DEFINITION }}
          echo "Task Definition ACCOUNT_ID 치환 완료: ${ACCOUNT_ID}"

      # 4. Task Definition 컨테이너 이미지 URI 교체
      #    CICD2 cd Job: docker pull + docker run (EC2에서 직접 실행)
      #    현재: Task Definition JSON의 image 필드만 새 URI로 업데이트
      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-______-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name:  ${{ env.______ }}
          image:           ${{ needs.ci.outputs.______ }}

      # 5. ECS Rolling Update 배포
      #    CICD2: aws ssm send-command → EC2에서 docker run
      #    현재:  ECS가 Task를 자동으로 교체 (Rolling Update, 무중단)
      - name: Deploy to ECS (Rolling Update)
        uses: aws-actions/amazon-ecs-______-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:  ${{ env.______ }}
          cluster:  ${{ env.______ }}
          wait-for-service-stability: ______    # 배포 완료까지 대기

      # 6. 배포 결과 출력
      - name: Print deployment result
        run: |
          echo "=============================="
          echo " 배포 완료"
          echo " 이미지: ${{ needs.ci.outputs.______ }}"
          echo " 클러스터: ${{ env.______ }}"
          echo " 서비스: ${{ env.______ }}"
          echo "=============================="
