# .github/workflows/cicd.yml — 단계 1: SSH + Private Key 직접 실행

name: CI/CD - cicd-basic-lab to mylab-bastion

# 빈칸 1: main 브랜치 push와 수동 실행 두 가지 트리거 작성
on:
  push:
    branches: [main]
  workflow_dispatch:

# 빈칸 2: 같은 워크플로우/브랜치 동시 실행 시 이전 실행 취소되도록 설정
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cicd-basic-lab

    # 빈칸 3: cd Job에서 참조할 Artifact 이름을 outputs로 노출
    outputs:
      artifact_name: ${{ steps.set-name.outputs.value }}

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # 빈칸 4: Maven 의존성 캐시 키워드
          cache: maven

      - name: Maven 빌드
        run: mvn -B package -DskipTests

      - name: JAR 파일명 정리
        run: mv ./target/*.jar ./target/app.jar

      - name: Artifact 이름 설정
        id: set-name
        # 빈칸 5: GITHUB_OUTPUT에 value=app-{run_number} 형식으로 저장
        run: echo "value=app-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: JAR Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-name.outputs.value }}
          # 빈칸 6: 업로드할 파일 경로
          path: ./cicd-basic-lab/target/app.jar
          retention-days: 1
